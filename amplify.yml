version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -e NEXT_PUBLIC_SUPABASE_URL >> .env.production
        - env | grep -e NEXT_PUBLIC_SUPABASE_ANON_KEY >> .env.production
        - env | grep -e SUPABASE_SERVICE_ROLE_KEY >> .env.production
        - env | grep -e GEMINI_API_KEY >> .env.production
        - env | grep -e MOCK_GEMINI >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
