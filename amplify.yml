version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - printenv NEXT_PUBLIC_SUPABASE_URL | sed 's/^/NEXT_PUBLIC_SUPABASE_URL=/' >> .env.production
        - printenv NEXT_PUBLIC_SUPABASE_ANON_KEY | sed 's/^/NEXT_PUBLIC_SUPABASE_ANON_KEY=/' >> .env.production
        - printenv SUPABASE_SERVICE_ROLE_KEY | sed 's/^/SUPABASE_SERVICE_ROLE_KEY=/' >> .env.production
        - printenv GEMINI_API_KEY | sed 's/^/GEMINI_API_KEY=/' >> .env.production
        - printenv MOCK_GEMINI | sed 's/^/MOCK_GEMINI=/' >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
